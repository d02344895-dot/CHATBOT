<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Otterly Spotless — Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 16px;
      padding: 16px;
    }

    /* ── Settings Panel ── */
    .settings-panel {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .settings-toggle {
      width: 100%;
      padding: 14px 18px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #202124;
    }

    .settings-toggle:hover { background: #f8f9fa; }

    .settings-toggle .left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-toggle .icon { font-size: 16px; }

    .arrow {
      font-size: 12px;
      color: #9aa0a6;
      transition: transform 0.2s;
    }

    .arrow.open { transform: rotate(180deg); }

    .settings-body {
      display: none;
      padding: 0 18px 18px;
      border-top: 1px solid #f1f3f4;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .settings-body.collapsed { display: none; }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: #5f6368;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .settings-body input[type="password"],
    .settings-body textarea {
      width: 100%;
      border: 1.5px solid #e8eaed;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      color: #202124;
    }

    .settings-body input[type="password"]:focus,
    .settings-body textarea:focus { border-color: #1a73e8; }

    .settings-body textarea {
      resize: vertical;
      min-height: 110px;
      line-height: 1.5;
    }

    .save-btn {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .save-btn:hover { background: #1557b0; }

    .save-notice {
      font-size: 12px;
      color: #34a853;
      font-weight: 600;
      display: none;
      align-self: center;
    }

    /* ── Chat Widget ── */
    .chat-wrapper {
      width: 100%;
      max-width: 440px;
      height: 560px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h2 { font-size: 16px; font-weight: 600; }
    .header-info p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .online-dot {
      width: 8px; height: 8px;
      background: #4caf50;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.bot  { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .message-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: #1a73e8;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      color: #fff;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .bot .bubble  { background: #f1f3f4; color: #202124; border-bottom-left-radius: 4px; }
    .user .bubble { background: #1a73e8; color: #fff;    border-bottom-right-radius: 4px; }

    .typing-indicator { display: flex; align-items: flex-end; gap: 8px; align-self: flex-start; }

    .typing-dots {
      background: #f1f3f4;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex; gap: 4px; align-items: center;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      background: #9aa0a6;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
    }

    .qr-btn {
      border: 1.5px solid #1a73e8;
      color: #1a73e8;
      background: #fff;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .qr-btn:hover { background: #1a73e8; color: #fff; }

    .chat-input {
      padding: 14px 16px;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #fff;
    }

    .chat-input textarea {
      flex: 1;
      border: 1.5px solid #e8eaed;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    .chat-input textarea:focus { border-color: #1a73e8; }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #1a73e8;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    .send-btn:hover  { background: #1557b0; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn svg    { width: 18px; height: 18px; fill: #fff; }

    .branding { text-align: center; font-size: 11px; color: #9aa0a6; padding: 6px; background: #fff; }

    /* warning banner */
    .warning {
      background: #fff3e0;
      color: #e65100;
      font-size: 12px;
      padding: 8px 14px;
      border-top: 1px solid #ffe0b2;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<!-- ── Settings Panel ── -->
<div class="settings-panel">
  <button class="settings-toggle" onclick="toggleSettings()">
    <span class="left">
      <span class="icon">⚙️</span> Settings
    </span>
    <span class="arrow" id="arrow">▼</span>
  </button>

  <div class="settings-body collapsed" id="settingsBody">

    <!-- API Key -->
    <div style="padding-top:4px">
      <div class="field-label">🔑 OpenAI API Key</div>
      <input type="password" id="apiKeyInput" placeholder="sk-..." />
    </div>

    <!-- Business Info -->
    <div>
      <div class="field-label">📋 About Your Business
        <span style="font-weight:400;color:#9aa0a6">(tell the bot what to say)</span>
      </div>
      <textarea id="businessInfo" placeholder="Example:
- Company: Otterly Spotless
- Services: house cleaning, deep cleaning, office cleaning
- Offer: $50 off first service
- Phone: (470) 298-8884
- Hours: Mon–Sun 8am–6pm
- Tone: friendly and helpful"></textarea>
    </div>

    <div style="display:flex;align-items:center;justify-content:flex-end;gap:12px">
      <span class="save-notice" id="saveNotice">✓ Saved!</span>
      <button class="save-btn" onclick="saveSettings()">Save & Apply</button>
    </div>

  </div>
</div>

<!-- ── Chat Widget ── -->
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">🦦</div>
    <div class="header-info">
      <h2>Otterly Spotless</h2>
      <p><span class="online-dot"></span>Online — typically replies instantly</p>
    </div>
  </div>

  <div id="warningBanner" class="warning">
    ⚠️ No API key set — open Settings above and add your OpenAI key.
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="quick-replies" id="quickReplies">
    <button class="qr-btn" onclick="sendQuick('Get a Free Quote')">🧹 Get a Free Quote</button>
    <button class="qr-btn" onclick="sendQuick('Tell me about the $50 off offer')">💰 $50 Off Offer</button>
    <button class="qr-btn" onclick="sendQuick('What services do you offer?')">📋 Our Services</button>
    <button class="qr-btn" onclick="sendQuick('How do I contact you?')">📞 Contact Us</button>
  </div>

  <div class="chat-input">
    <textarea id="userInput" rows="1" placeholder="Type a message…"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="branding">Powered by Otterly Spotless AI</div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("userInput");
  const quickEl    = document.getElementById("quickReplies");
  const warningEl  = document.getElementById("warningBanner");

  const subscriberId = "web_" + Math.random().toString(36).slice(2, 10);
  let messageSent = false;

  // Load saved settings from localStorage
  const savedKey  = localStorage.getItem("openai_api_key") || "";
  const savedInfo = localStorage.getItem("business_info") || "";
  document.getElementById("apiKeyInput").value  = savedKey;
  document.getElementById("businessInfo").value = savedInfo;

  // Show warning if no key saved
  if (!savedKey) warningEl.style.display = "block";

  window.addEventListener("load", () => {
    setTimeout(() => {
      appendMessage("bot", "Hi there! 👋 Welcome to Otterly Spotless — Georgia's trusted cleaning experts!\n\nHow can I help you today?");
    }, 400);
  });

  function toggleSettings() {
    const body  = document.getElementById("settingsBody");
    const arrow = document.getElementById("arrow");
    const isOpen = !body.classList.contains("collapsed");
    body.classList.toggle("collapsed", isOpen);
    arrow.classList.toggle("open", !isOpen);
  }

  function saveSettings() {
    const key  = document.getElementById("apiKeyInput").value.trim();
    const info = document.getElementById("businessInfo").value.trim();
    localStorage.setItem("openai_api_key", key);
    localStorage.setItem("business_info", info);

    warningEl.style.display = key ? "none" : "block";

    const notice = document.getElementById("saveNotice");
    notice.style.display = "inline";
    setTimeout(() => notice.style.display = "none", 2000);
  }

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
  });

  function sendQuick(text) { sendMessage(text); }

  async function sendMessage(overrideText) {
    const text = (overrideText || inputEl.value).trim();
    if (!text) return;

    if (!messageSent) {
      quickEl.style.display = "none";
      messageSent = true;
    }

    appendMessage("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";

    const typingEl = showTyping();

    const apiKey      = localStorage.getItem("openai_api_key") || "";
    const businessInfo = localStorage.getItem("business_info") || "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          subscriber_id: subscriberId,
          last_message: text,
          first_name: "Customer",
          api_key: apiKey,
          business_info: businessInfo
        })
      });

      const data = await res.json();
      removeTyping(typingEl);
      const reply = data?.content?.messages?.[0]?.text || "Sorry, something went wrong!";
      appendMessage("bot", reply);

    } catch (err) {
      removeTyping(typingEl);
      appendMessage("bot", "Oops! Something went wrong. Please call us at (470) 298-8884.");
    }
  }

  function appendMessage(role, text) {
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "message-avatar";
    avatar.textContent = role === "bot" ? "🦦" : "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
  }

  function showTyping() {
    const wrapper = document.createElement("div");
    wrapper.className = "typing-indicator";

    const avatar = document.createElement("div");
    avatar.className = "message-avatar";
    avatar.textContent = "🦦";

    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.innerHTML = "<span></span><span></span><span></span>";

    wrapper.appendChild(avatar);
    wrapper.appendChild(dots);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return wrapper;
  }

  function removeTyping(el) { el?.remove(); }
  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
</script>

</body>
</html>
